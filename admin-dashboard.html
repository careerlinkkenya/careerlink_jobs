<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | CareerLink</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            darkBg: '#1f2937',
            darkCard: '#374151',
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-darkBg text-white font-sans min-h-screen">

  <!-- Navigation -->
  <header class="bg-darkCard shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-primary">CareerLink Admin</h1>
    <nav class="space-x-4">
      <a href="admin-dashboard.html" class="text-white font-medium hover:text-primary">Dashboard</a>
      <a href="admin-applications.html" class="hover:text-primary">Applications</a>
      <a href="admin-messages.html" class="hover:text-primary">Messages</a>
      <a href="admin-payments.html" class="hover:text-primary">Payments</a>
      <button id="logoutBtn" class="text-red-400 hover:text-red-600">Logout</button>
    </nav>
  </header>

  <!-- Dashboard Content -->
  <main class="p-6 grid md:grid-cols-2 lg:grid-cols-4 gap-6">
    <div class="bg-darkCard p-5 rounded shadow">
      <h2 class="text-xl font-semibold mb-2">Total Users</h2>
      <p class="text-3xl font-bold text-primary" id="userCount">--</p>
    </div>

    <div class="bg-darkCard p-5 rounded shadow">
      <h2 class="text-xl font-semibold mb-2">Job Posts</h2>
      <p class="text-3xl font-bold text-primary" id="jobCount">--</p>
    </div>

    <div class="bg-darkCard p-5 rounded shadow">
      <h2 class="text-xl font-semibold mb-2">Applications</h2>
      <p class="text-3xl font-bold text-primary" id="appCount">--</p>
    </div>

    <div class="bg-darkCard p-5 rounded shadow">
      <h2 class="text-xl font-semibold mb-2">Payments</h2>
      <p class="text-3xl font-bold text-primary" id="paymentCount">--</p>
    </div>
  </main>

  <footer class="text-center py-4 mt-10 border-t border-gray-700 text-sm text-gray-400">
    &copy; 2025 CareerLink Admin Portal. All rights reserved.
  </footer>

  <!-- Firebase Auth & Dashboard Logic -->
  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      collection,
      getDocs
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const logoutBtn = document.getElementById('logoutBtn');

    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = 'login.html';
      });
    });

    onAuthStateChanged(auth, async user => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        // Fetch data counts
        const usersSnap = await getDocs(collection(db, "users"));
        const jobsSnap = await getDocs(collection(db, "jobs"));
        const appsSnap = await getDocs(collection(db, "applications"));
        const paymentsSnap = await getDocs(collection(db, "payments"));

        document.getElementById('userCount').textContent = usersSnap.size;
        document.getElementById('jobCount').textContent = jobsSnap.size;
        document.getElementById('appCount').textContent = appsSnap.size;
        document.getElementById('paymentCount').textContent = paymentsSnap.size;
      }
    });
  </script>
</body>
</html>
