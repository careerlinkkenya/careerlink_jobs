<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Payments | CareerLink</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            darkBg: '#1f2937',
            darkCard: '#374151'
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif']
          }
        }
      }
    };
  </script>
</head>
<body class="bg-darkBg text-white font-sans min-h-screen">

  <!-- Header -->
  <header class="bg-darkCard p-4 shadow flex justify-between items-center">
    <h1 class="text-2xl font-bold text-primary">CareerLink Admin</h1>
    <nav class="space-x-4">
      <a href="admin-dashboard.html" class="hover:text-primary">Dashboard</a>
      <a href="admin-applications.html" class="hover:text-primary">Applications</a>
      <a href="admin-messages.html" class="hover:text-primary">Messages</a>
      <a href="admin-payments.html" class="text-white font-medium hover:text-primary">Payments</a>
      <button id="logoutBtn" class="text-red-400 hover:text-red-600">Logout</button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="p-6">
    <h2 class="text-2xl font-semibold mb-6">Payment Records</h2>
    <div id="paymentsList" class="space-y-4">
      <!-- Payment entries will be loaded here -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-4 border-t border-gray-700 mt-10 text-sm text-gray-400">
    &copy; 2025 CareerLink Admin Portal. All rights reserved.
  </footer>

  <!-- Firebase Logic -->
  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const logoutBtn = document.getElementById('logoutBtn');
    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = 'login.html');
    });

    const paymentsList = document.getElementById('paymentsList');

    onAuthStateChanged(auth, async user => {
      if (!user) return window.location.href = 'login.html';

      const snapshot = await getDocs(collection(db, "payments"));
      if (snapshot.empty) {
        paymentsList.innerHTML = `<p class="text-gray-400">No payments recorded yet.</p>`;
        return;
      }

      snapshot.forEach(doc => {
        const payment = doc.data();
        const div = document.createElement('div');
        div.className = "bg-darkCard p-4 rounded shadow";

        div.innerHTML = `
          <h3 class="text-lg font-bold text-primary">${payment.fullName || 'Unnamed User'}</h3>
          <p><strong>Payment Type:</strong> ${payment.type || 'Unknown'}</p>
          <p><strong>Amount:</strong> KSh ${payment.amount || '0'}</p>
          <p><strong>Phone:</strong> ${payment.phone || 'N/A'}</p>
          <p><strong>Transaction ID:</strong> ${payment.transactionId || 'N/A'}</p>
          <p class="text-sm text-gray-400 mt-2">${payment.timestamp ? new Date(payment.timestamp.seconds * 1000).toLocaleString() : ''}</p>
        `;

        paymentsList.appendChild(div);
      });
    });
  </script>
</body>
</html>
