<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CareerLink | Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
          colors: {
            primary: '#16a34a',
            darkbg: '#0f172a'
          }
        }
      }
    }
  </script>
</head><link rel="stylesheet" href="style.css" />


<body class="bg-darkbg text-white font-poppins min-h-screen">
  <!-- Header -->
  <header class="bg-gray-900 text-white shadow p-4 flex justify-between items-center">
    <a href="index.html" class="text-2xl font-bold text-primary">CareerLink</a>
    <nav class="space-x-4 hidden md:block">
      <a href="home.html" class="hover:text-primary">Home</a>
      <a href="jobs.html" class="hover:text-primary">Browse Jobs</a>
      <a href="profile.html" class="hover:text-primary">Profile</a>
      <a href="saved-jobs.html" class="hover:text-primary">Saved Jobs</a>
      <button id="logoutBtn" class="hover:text-red-400">Logout</button>
    </nav>
  </header>

  <!-- Payment Section -->
  <section class="py-12 px-4 flex justify-center">
    <div class="bg-gray-800 rounded-lg shadow-md p-8 w-full max-w-xl text-center" data-aos="fade-up">
      <h2 class="text-3xl font-bold text-primary mb-6">Payment Instructions</h2>
      <p class="text-lg mb-2">Application Type: <span id="paymentType" class="font-semibold text-primary"></span></p>
      <p class="text-xl mb-4">Amount to Pay: <span id="amount" class="text-green-400 font-bold"></span></p>
      <p class="mb-4">Pay via <span class="text-yellow-400 font-semibold">Airtel Money</span> to:</p>
      <div class="text-lg font-semibold text-white mb-4">
        <p>📱 <span class="text-green-300">0102960463</span></p>
        <p>👤 Patrick Muturi</p>
      </div>
      <p class="mb-6 text-sm text-gray-400">After payment, click below to confirm and proceed.</p>
      <button onclick="goToConfirmation()" class="bg-primary text-white py-2 px-6 rounded hover:bg-green-700 transition">
        I've Paid
      </button>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center text-sm text-gray-500 py-6">
    &copy; 2025 CareerLink. All rights reserved.
  </footer>

  <!-- Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBnrOBOoAas9DD_FiGJYLLz1RUqT_Clkvg",
      authDomain: "careerlink-ebeed.firebaseapp.com",
      projectId: "careerlink-ebeed",
      storageBucket: "careerlink-ebeed.appspot.com",
      messagingSenderId: "311863050655",
      appId: "1:311863050655:web:a12a4cd36014e5e577bdaa",
      measurementId: "G-JR4PQD3EKL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auth Check
    const user = JSON.parse(localStorage.getItem("careerlinkUser"));
    if (!user) {
      alert("Please log in first.");
      window.location.href = "login.html";
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      signOut(auth);
      localStorage.removeItem("careerlinkUser");
      window.location.href = "login.html";
    });

    // Payment Type Logic
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");
    const paymentType = document.getElementById("paymentType");
    const amount = document.getElementById("amount");

    if (type === "direct") {
      paymentType.textContent = "Direct Placement";
      amount.textContent = "KSh 950";
    } else if (type === "interview") {
      paymentType.textContent = "Interview Booking";
      amount.textContent = "KSh 350";
    } else {
      paymentType.textContent = "General Application";
      amount.textContent = "KSh 750";
    }

    // Redirect to confirmation
    window.goToConfirmation = function() {
      window.location.href = `confirmation.html?type=${type}`;
    }
  </script>
  <script>AOS.init();</script>
</body>
</html>
