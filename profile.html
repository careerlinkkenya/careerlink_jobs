<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CareerLink | Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <!-- NAVIGATION -->
  <nav class="bg-gray-800 p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <a href="home.html" class="text-green-400 font-bold text-xl">CareerLink</a>
      <div class="hidden md:flex space-x-6 items-center">
        <a href="home.html" class="hover:text-green-400">Home</a>
        <a href="jobs.html" class="hover:text-green-400">Find Jobs</a>
        <a href="saved-jobs.html" class="hover:text-green-400">Saved</a>
        <a href="chat.html" class="hover:text-green-400">Chat</a>
        <a href="faq.html" class="hover:text-green-400">FAQ</a>
        <a href="report-issue.html" class="hover:text-green-400">Report Issue</a>
        <button onclick="logout()" class="text-red-500 hover:text-red-400">Logout</button>
      </div>
      <button class="md:hidden text-white" onclick="toggleMenu()">
        <i data-feather="menu"></i>
      </button>
    </div>
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden mt-2 space-y-2 px-4">
      <a href="home.html" class="block hover:text-green-400">Home</a>
      <a href="jobs.html" class="block hover:text-green-400">Find Jobs</a>
      <a href="saved-jobs.html" class="block hover:text-green-400">Saved</a>
      <a href="chat.html" class="block hover:text-green-400">Chat</a>
      <a href="faq.html" class="block hover:text-green-400">FAQ</a>
      <a href="report-issue.html" class="block hover:text-green-400">Report Issue</a>
      <button onclick="logout()" class="text-red-500 hover:text-red-400">Logout</button>
    </div>
  </nav>

  <!-- PROFILE -->
  <div class="container mx-auto px-4 py-10">
    <h2 class="text-3xl font-bold mb-6 text-green-400">Your Profile</h2>
    <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
      <p><span class="font-semibold">Name:</span> <span id="profileName">Loading...</span></p>
      <p><span class="font-semibold">Email:</span> <span id="profileEmail">Loading...</span></p>
    </div>
  </div>

  <script>
    feather.replace();

    function toggleMenu() {
      const menu = document.getElementById("mobileMenu");
      menu.classList.toggle("hidden");
    }

    function logout() {
      localStorage.removeItem('careerlinkUser');
      window.location.href = "login.html";
    }

    // Authentication check
    const user = JSON.parse(localStorage.getItem('careerlinkUser'));
    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById('profileName').innerText = user.name || "User";
      document.getElementById('profileEmail').innerText = user.email;
    }
  </script>
</body>
</html>
